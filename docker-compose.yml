services:
  postgres:
    image: postgres:16-alpine
    container_name: perfumes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: perfumes
    ports:
      - "5432:5432"
    volumes:
      - perfumes_pgdata:/var/lib/postgresql/data

volumes:
  perfumes_pgdata:
